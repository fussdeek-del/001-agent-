# render.yaml
services:
  - type: web
    name: slack-ai-agent
    env: node
    plan: free 
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: slack-db # Must match your Render DB name
          property: connectionString
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: SLACK_PRIVATE_CHANNEL_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: COMPANY_NAME
        sync: false
      - key: COMPANY_PRODUCT
        sync: false

databases:
  - name: slack-db
    plan: free